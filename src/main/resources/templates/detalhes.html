
<html>
    <head>
        <title th:text=${filme.titulo}></title>
        <meta charset="UTF-8">
          <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}"> 
        <link rel="stylesheet" th:href="@{${css == 'escuro' ? '/css/escuro.css' : '/css/claro.css'}}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    </head>
    <body> <div>
             <header th:insert="navbar.html"></header>
      <h1><span th:text="${filme.titulo}"></span></h1>
      <p>Ano de lançamento: <span th:text="${filme.ano}"></span></p>
       <p>Gênero:  <span th:text="${filme.genero}"></span></p>
        <p>Sinopse: <span th:text="${filme.sinopse}"></span></p>
       </div>
        
      
           
            
         
<form th:action="@{/cadastroanalises(id=${filme.id})}" method="get">
      <input type="hidden" name="id" th:field="${filme.id}" th:value="${filme}">
    <button type="submit" class="btn" >Fazer análise</button>
    
</form>
          
            
        
            <form th:action="@{/atualizarfilme(id=${filme.id})}" method="get">
      <input type="hidden" name="id" th:field="${filme.id}" th:value="${filme}">
    <button type="submit" class="btn" >Editar</button>
            </form>
           
       
           
        <button class="btn" th:onclick="deletarFilme([[${filme.id}]])">Deletar</button>
          
          
        
        <div class="analises">
            <p></p>
            <span> Análises feitas: </span>
             <ul>
    <li th:each="analise : ${analises}">
        <strong>Análise:</strong> <span th:text="${analise.comentario}"></span> <br/>
        <strong>Nota:</strong> <span th:text="${analise.nota}"></span>
        <button class="btn" type="button" th:onclick="redirectToAtualizar([[${analise.id}]])" >Alterar</button>
        <button class="btn" type="button" th:onclick="redirectToDeletar([[${analise.id}]])" >Excluir</button>
        <p></p>
    </li>
</ul>
            
        </div>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function deletarFilme(id) {
            fetch(`/filme/deletar/`+id, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    if(confirm("Tem certeza que deseja deletar esse filme e todas as suas análises?")){
                    window.location.href = "/listagem";}
                } else {
                 
                    console.error('Erro ao deletar o objeto.');
                }
            })
            .catch(error => console.error('Erro:', error));
        }
        function redirectToAtualizar(analiseId) {
        window.location.href = '/atualizacaoanalises?id=' + analiseId;
    }
    function redirectToDeletar(analiseId) {
        
        fetch(`/analise/deletar/`+analiseId, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    if(confirm("Esta análise será excluída para sempre")){
                    window.location.reload();}
                } else {
                 
                    console.error('Erro ao deletar o objeto.');
                }
            })
            .catch(error => console.error('Erro:', error));
    
    }
        </script>
    </body>
</html>
