<html>
    <head>
        
        <title>Filmes</title>
         <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}"> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{${css == 'escuro' ? '/css/escuro.css' : '/css/claro.css'}}">
    </head>
    <body>
         <header th:insert="navbar.html"></header>
        <h1>Filmes cadastrados:</h1>
         <table class='table'>
                        <thead>
                            <tr>
                                <th>Id</th>
                                <th>Título</th>
                                  <!--  <th>Gênero</th> -->
                                <th>Ano de Lançamento</th>
                                 <!--   <th>Sinopse</th> -->
                                <th > - </th>
                               
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="filme : ${filmes}">
                                <td th:text="${filme.id}"></td>
                                <td th:text="${filme.titulo}"></td>
                                <!-- <td th:text="${filme.genero}"></td> -->
                                <td th:text="${filme.ano}"></td>
                                 <!--   <td th:text="${filme.sinopse}"></td> -->
                              
                                <td>
                                    <a th:href="@{/detalhes(id=${filme.id})}"> Ver mais </a>
                                </td>
                               
                            </tr>
                        </tbody>
                    </table>
        
        <div></div>
    </body>
</html>
